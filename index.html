<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b12" />

    <title>Evaluchess — Play, Analyze, and Improve Your Chess</title>
    <meta
      name="description"
      content="Evaluchess is a free online chess improvement tool. Play rated games against other humans or practice against Stockfish, then get an instant move-by-move accuracy review of every game. Track your Elo, wins, and losses — and learn from your mistakes."
    />
    <meta name="keywords" content="chess, chess analysis, chess improvement, play chess online, stockfish, chess training, chess accuracy, chess rating, elo" />
    <meta name="author" content="Evaluchess" />
    <link rel="canonical" href="https://evaluchess.com/" />

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://evaluchess.com/" />
    <meta property="og:site_name" content="Evaluchess" />
    <meta property="og:title" content="Evaluchess — Play, Analyze, and Improve Your Chess" />
    <meta
      property="og:description"
      content="Play rated chess against humans or Stockfish, then get an instant accuracy review of every move. Sharpen your game with real-time evaluation and post-game analysis."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Evaluchess — Play, Analyze, and Improve Your Chess" />
    <meta
      name="twitter:description"
      content="Play rated chess against humans or Stockfish, then get an instant accuracy review of every move."
    />

    <!-- Structured data so search engines render a richer snippet -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Evaluchess",
        "url": "https://evaluchess.com/",
        "description": "A free online chess improvement tool. Play rated games against humans or Stockfish and get instant move-by-move accuracy analysis after every game.",
        "applicationCategory": "GameApplication",
        "genre": "Chess",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
